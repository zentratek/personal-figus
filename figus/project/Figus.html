<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Figus — Tu álbum digital</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Bungee&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080F;
    --surface: #14141F;
    --surface-2: #1C1C2A;
    --surface-3: #262638;
    --border: #2A2A3D;
    --primary: #FF2D8E;
    --cyan: #00F0FF;
    --lime: #C6FF3E;
    --gold: #FFC700;
    --red: #FF4D4D;
    --text: #F5F5FF;
    --muted: #6E6E85;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 36px 16px 36px;
    background:
      radial-gradient(ellipse at 25% 15%, rgba(255, 45, 142, 0.18), transparent 50%),
      radial-gradient(ellipse at 80% 85%, rgba(0, 240, 255, 0.13), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(155, 91, 255, 0.06), transparent 60%),
      #050509;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }
  button { font-family: inherit; cursor: pointer; padding: 0; border: 0; background: none; color: inherit; }
  input { font-family: inherit; }
  .figus-app {
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow-x: hidden;
  }
  /* Hide scrollbars inside the device for cleanliness */
  .figus-app::-webkit-scrollbar,
  [data-figus-scroll]::-webkit-scrollbar { width: 0; height: 0; }
  /* Horizontal scrollers (filter chips, swap rows) */
  div[style*="overflowX: auto"]::-webkit-scrollbar { height: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="src/data.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/screens.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
